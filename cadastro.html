<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./CSS/estilo.css">
    <title>Cadastro</title>
</head>
<body>
    <figure id="banner">
        <img src="./Imagens/Banner.png" alt="Banner">
        <p>Olá, que bom que você pretende adotar um amiguinho, para seguir adiante, realize seu cadastro!</p>
    </figure>

    <section class="cadastro">
    <h1>Cadastro</h1>
        <form>
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome" required><br>
            <label for="cpf">CPF: </label>
            <input type="number" id="cpf" name="cpf" required><br>
            <label for="endereco">Endereço: </label>
            <input type="text" id="endereco" name="endereco" required><br>
            <label for="telefone">Telefone: </label>
            <input type="tel" id="telefone" name="telefone" required><br>
            <label for="renda">Renda mensal: </label>
            <input type="number" id="renda" name="renda" required><br>
            <label for="senha">Senha: </label>
            <input type="password" id="senha" name="senha" required><br>
            <input type="submit" value="Efetuar cadastro">
        </form>
    </section>
    
</body>
</html>
