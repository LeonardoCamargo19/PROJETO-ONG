<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./CSS/estilo.css">
    <title>Login</title>
</head>
<body>
    <figure id="banner">
        <img src="./Imagens/Banner.png" alt="Banner da ong">
        <p>Para conseguir adotar seu novo amiguinho, É necessario fazer login!</p>
    </figure>

    <section class="login">
    <h1>Login</h1>
        <form>
            <label for="cpf-login">CPF: </label>
            <input type="number" id="cpf-login" name="cpf-login" required><br>
            <label for="senha-login">Senha: </label>
            <input type="password" id="senha-login" name="senha-login" required><br>
            <input type="submit" value="Efetuar login">
        </form>
    </section>

</body>
</html>
